<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback API System</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 600px;
            margin-bottom: 20px;
        }

        h2 {
            margin-top: 0;
            color: #333;
        }

        input,
        textarea {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            margin-bottom: 10px;
        }

        button:hover {
            background-color: #0056b3;
        }

        .btn-secondary {
            background-color: #28a745;
        }

        .btn-secondary:hover {
            background-color: #218838;
        }

        .feedback-item {
            background: #f9f9f9;
            padding: 15px;
            border-left: 4px solid #007bff;
            margin-bottom: 10px;
            border-radius: 4px;
            position: relative;
        }

        .timestamp {
            font-size: 0.8em;
            color: #666;
        }

        .hidden {
            display: none !important;
        }

        #message-box {
            color: red;
            font-size: 0.9em;
            margin-bottom: 10px;
            text-align: center;
        }

        /* Modal styling */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            width: 90%;
            max-width: 500px;
        }

        .attachment-edit-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f4f7f6;
            padding: 8px 12px;
            border-radius: 4px;
            border: 1px solid #ddd;
            margin-bottom: 5px;
        }

        .attachment-edit-item.marked-deleted {
            text-decoration: line-through;
            opacity: 0.5;
        }

        .delete-attachment-btn {
            background: none !important;
            border: none !important;
            color: #dc3545 !important;
            font-size: 1.2em !important;
            cursor: pointer;
            padding: 0 !important;
            width: auto !important;
            margin: 0 !important;
        }
    </style>
</head>

<body>

    <div id="auth-section" class="container">
        <h2>Feedback API System</h2>
        <div id="message-box"></div>
        <input type="email" id="email" placeholder="Email Address">
        <input type="password" id="password" placeholder="Password (Min 8 chars, 1 Uppercase, 1 Number)">
        <button onclick="signIn()">Log In</button>
        <button class="btn-secondary" onclick="signUp()">Sign Up</button>
    </div>

    <div id="dashboard-section" class="container hidden">
        <h2>Logged In Dashboard</h2>
        <p>Logged in as: <strong id="user-display"></strong></p>
        <button class="btn-secondary" onclick="logout()" style="background-color: #dc3545;">Log Out</button>
    </div>

    <div class="container" id="submit-section">
        <h2>Submit Feedback</h2>
        <p id="user-status-display">Submitting as: <strong>Anonymous</strong></p>
        <textarea id="feedback-text" rows="4" placeholder="Write your feedback here..."></textarea>
        <div style="margin: 10px 0; display: flex; align-items: center; gap: 10px;">
            <span style="font-weight: bold; font-size: 0.9em; color: #555;">Attach Files/Images:</span>
            <button type="button" onclick="event.stopPropagation(); document.getElementById('attachment-file').click()"
                style="background-color: #6c757d; font-size: 0.85em; padding: 6px 12px; width: auto; margin: 0; white-space: nowrap;">
                Choose Files
            </button>
            <span id="file-chosen-text"
                style="font-size: 0.85em; color: #666; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">No
                files chosen</span>
            <input type="file" id="attachment-file" multiple style="display: none;">
        </div>
        <button onclick="submitFeedback()">Submit Feedback</button>
    </div>

    <div class="container">
        <h2>Recent Feedback</h2>
        <button class="btn-secondary" onclick="downloadFeedback()">📥 Download as JSON</button>
        <div id="feedback-list">Loading feedback...</div>
    </div>

    <div id="edit-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <h2 style="margin-bottom: 15px;">Edit Feedback</h2>
            <textarea id="edit-feedback-text" rows="4" style="margin-bottom: 15px;"></textarea>

            <div style="margin-bottom: 15px;">
                <span
                    style="font-weight: bold; font-size: 0.9em; display: block; margin-bottom: 8px; color: #555;">Current
                    Attachments:</span>
                <div id="edit-attachments-list"
                    style="display: flex; flex-direction: column; gap: 8px; max-height: 150px; overflow-y: auto;"></div>
            </div>

            <div style="margin-bottom: 15px; display: flex; align-items: center; gap: 10px;">
                <span style="font-weight: bold; font-size: 0.9em; color: #555;">Add Attachments:</span>
                <button type="button"
                    onclick="event.stopPropagation(); document.getElementById('edit-attachment-file').click()"
                    style="background-color: #6c757d; font-size: 0.8em; padding: 5px 10px; width: auto; margin: 0; white-space: nowrap;">
                    Choose Files
                </button>
                <span id="edit-file-chosen-text"
                    style="font-size: 0.8em; color: #666; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">No
                    files chosen</span>
                <input type="file" id="edit-attachment-file" multiple style="display: none;">
            </div>

            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button onclick="saveEdit()" style="background-color: #28a745; margin: 0;">Save Changes</button>
                <button onclick="closeEditModal()" style="background-color: #dc3545; margin: 0;">Cancel</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="config.js"></script>
    <script src="app.js"></script>
</body>

</html>
